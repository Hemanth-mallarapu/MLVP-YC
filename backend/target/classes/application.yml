server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/mlvpyc
    username: mlvpyc_user
    password: change_me
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  security:
    filter:
      order: 10
  mail:
    host: smtp.gmail.com
    port: 587
    # Spring will automatically read these from your system environment variables at runtime
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: change-this-to-a-long-random-secret-in-production
    expiration-ms: 86400000
  loan:
    max-amount-per-term: 200000
    default-interest-rate: 5.0
    term-months: 6